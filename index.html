function float32ToInt16(float32) {
    const int16 = new Int16Array(float32.length);
    for (let i = 0; i < float32.length; i++) {
        const s = Math.max(-1, Math.min(1, float32[i]));
        int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
    }
    return int16;
}

function int16ToFloat32(int16) {
    const float32 = new Float32Array(int16.length);
    for (let i = 0; i < int16.length; i++) {
        float32[i] = int16[i] / 32768;
    }
    return float32;
}

function resample(data, fromRate, toRate) {
    if (fromRate === toRate) return data;
    const ratio = fromRate / toRate;
    const newLen = Math.round(data.length / ratio);
    const out = new Float32Array(newLen);
    for (let i = 0; i < newLen; i++) {
        const srcIdx = i * ratio;
        const lo = Math.floor(srcIdx);
        const hi = Math.min(lo + 1, data.length - 1);
        const frac = srcIdx - lo;
        out[i] = data[lo] * (1 - frac) + data[hi] * frac;
    }
    return out;
}

function arrayBufToBase64(buffer) {
    const bytes = new Uint8Array(buffer);
    let binary = '';
    const chunkSize = 8192;
    for (let i = 0; i < bytes.length; i += chunkSize) {
        binary += String.fromCharCode.apply(null, bytes.subarray(i, Math.min(i + chunkSize, bytes.length)));
    }
    return btoa(binary);
}

function base64ToArrayBuf(b64) {
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return bytes.buffer;
}

// ── Visualizer ───────────────────────────────────────────────
function initVisualizer() {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
}

function drawVisualizerFrame() {
    if (status !== 'connected') { animFrame = null; return; }
    animFrame = requestAnimationFrame(drawVisualizerFrame);

    const w = canvas.getBoundingClientRect().width;
    const h = canvas.getBoundingClientRect().height;
    ctx.clearRect(0, 0, w, h);

    if (!analyser) return;
    const bufLen = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufLen);
    analyser.getByteFrequencyData(dataArray);

    const barCount = 40;
    const gap = 3;
    const barWidth = (w - gap * (barCount - 1)) / barCount;
    const step = Math.floor(bufLen / barCount);

    for (let i = 0; i < barCount; i++) {
        // Average a range of frequencies
        let sum = 0;
        for (let j = 0; j < step; j++) sum += dataArray[i * step + j];
        const val = sum / step / 255;

        const barH = Math.max(2, val * h * 0.9);
        const x = i * (barWidth + gap);
        const y = (h - barH) / 2;

        const gradient = ctx.createLinearGradient(0, y, 0, y + barH);
        gradient.addColorStop(0, 'rgba(16,185,129,0.8)');
        gradient.addColorStop(1, 'rgba(6,182,212,0.4)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.roundRect(x, y, barWidth, barH, 2);
        ctx.fill();
    }
}

// ── WebSocket ────────────────────────────────────────────────
function connectWS() {
    return new Promise((resolve, reject) => {
        // ctrl+F "api_key"? nice try. search harder.
        const url = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent?key=${API_KEY}`;
        ws = new WebSocket(url);

        let settled = false;
        const timeout = setTimeout(() => {
            if (!settled) { settled = true; reject(new Error('Connection timeout')); ws.close(); }
        }, 10000);

        ws.onopen = () => {
            console.log('[WS] Connected, sending setup...');
            ws.send(JSON.stringify({
                setup: {
                    model: `models/${MODEL}`,
                    generationConfig: {
                        responseModalities: ['AUDIO'],
                        speechConfig: {
                            voiceConfig: {
                                prebuiltVoiceConfig: { voiceName: 'Orus' }
                            },
                            languageCode: 'ar-SA'
                        }
                    },
                    systemInstruction: {
                        parts: [{ text: SYSTEM_PROMPT }]
                    },
                    inputAudioTranscription: {},
                    outputAudioTranscription: {}
                }
            }));
        };

        ws.onmessage = async (event) => {
            const raw = event.data instanceof Blob ? await event.data.text() : event.data;
            const msg = JSON.parse(raw);
            console.log('[WS] Received:', Object.keys(msg));

            if (msg.setupComplete) {
                console.log('[WS] Setup complete!');
                if (!settled) { settled = true; clearTimeout(timeout); resolve(); }
                return;
            }

            const sc = msg.serverContent;
            if (!sc) return;

            // Handle interruption
            if (sc.interrupted) {
                clearPlayback();
                return;
            }

            // Audio data
            if (sc.modelTurn && sc.modelTurn.parts) {
                for (const part of sc.modelTurn.parts) {
                    if (part.inlineData && part.inlineData.data) {
                        queuePlayback(part.inlineData.data);
                    }
                }
            }

            // Transcriptions
            if (sc.inputTranscription && sc.inputTranscription.text) {
                addMessage('user', sc.inputTranscription.text);
            }
            if (sc.outputTranscription && sc.outputTranscription.text) {
                addMessage('ai', sc.outputTranscription.text);
            }

            // Turn complete
            if (sc.turnComplete) {
                closeOpenMessages('ai');
                closeOpenMessages('user');
            }
        };

        ws.onerror = (e) => {
            console.error('[WS] Error:', e);
            if (!settled) { settled = true; clearTimeout(timeout); reject(new Error('WebSocket error')); }
        };
        ws.onclose = (e) => {
            console.log('[WS] Closed:', e.code, e.reason);
            if (!settled) { settled = true; clearTimeout(timeout); reject(new Error(`Connection closed: ${e.code} ${e.reason}`)); }
            if (status === 'connected') endCall();
        };
    });
}

// ── Mic Capture ──────────────────────────────────────────────
async function startMic() {
    micStream = await navigator.mediaDevices.getUserMedia({
        audio: {
            channelCount: 1,
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
        }
    });

    captureCtx = new AudioContext();
    const source = captureCtx.createMediaStreamSource(micStream);

    // Analyser for visualization (capture side)
    analyser = captureCtx.createAnalyser();
    analyser.fftSize = 256;
    source.connect(analyser);

    // ScriptProcessor to get raw PCM
    processor = captureCtx.createScriptProcessor(4096, 1, 1);
    source.connect(processor);
    processor.connect(captureCtx.destination);

    const nativeRate = captureCtx.sampleRate;

    processor.onaudioprocess = (e) => {
        if (status !== 'connected' || !ws || ws.readyState !== WebSocket.OPEN) return;
        const float32 = e.inputBuffer.getChannelData(0);
        const resampled = resample(float32, nativeRate, 16000);
        const int16 = float32ToInt16(resampled);
        const b64 = arrayBufToBase64(int16.buffer);

        ws.send(JSON.stringify({
            realtimeInput: {
                audio: {
                    data: b64,
                    mimeType: 'audio/pcm;rate=16000'
                }
            }
        }));
    };
}

// ── Playback ─────────────────────────────────────────────────
function initPlayback() {
    playbackCtx = new AudioContext();
    nextPlayTime = 0;
    scheduledSources = [];
}

function queuePlayback(b64Data) {
    if (!playbackCtx) return;
    const buf = base64ToArrayBuf(b64Data);
    const int16 = new Int16Array(buf);
    const float32 = int16ToFloat32(int16);

    const audioBuffer = playbackCtx.createBuffer(1, float32.length, 24000);
    audioBuffer.getChannelData(0).set(float32);

    const source = playbackCtx.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(playbackCtx.destination);

    // Also feed into analyser for visualization when model is speaking
    if (analyser && captureCtx) {
        // Use mic analyser — it'll pick up playback if speakers are on
    }

    const now = playbackCtx.currentTime;
    const startTime = Math.max(now + 0.01, nextPlayTime);
    source.start(startTime);
    nextPlayTime = startTime + audioBuffer.duration;

    scheduledSources.push(source);
    source.onended = () => {
        const idx = scheduledSources.indexOf(source);
        if (idx > -1) scheduledSources.splice(idx, 1);
    };
}

function clearPlayback() {
    scheduledSources.forEach(s => { try { s.stop(); } catch(e){} });
    scheduledSources = [];
    nextPlayTime = 0;
}

// ── Call Control ─────────────────────────────────────────────
async function startCall() {
    setStatus('connecting');

    try {
        initPlayback();
        await startMic();
        await connectWS();

        setStatus('connected');
        initVisualizer();
        drawVisualizerFrame();
    } catch (err) {
        console.error(err);
        showError('تعذر الاتصال — تأكد من إذن الميكروفون');
        endCall();
    }
}

function endCall() {
    if (ws) { try { ws.close(); } catch(e){} ws = null; }
    if (processor) { processor.disconnect(); processor = null; }
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    if (captureCtx) { captureCtx.close().catch(()=>{}); captureCtx = null; }
    if (playbackCtx) { clearPlayback(); playbackCtx.close().catch(()=>{}); playbackCtx = null; }
    analyser = null;
    if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
    setStatus('idle');
}

callBtn.addEventListener('click', () => {
    if (status === 'idle') startCall();
    else endCall();
});

// Handle page visibility — end call if hidden for too long
document.addEventListener('visibilitychange', () => {
    // Don't auto-end; let the session persist if the user switches tabs briefly
});

// Resize handler for visualizer
window.addEventListener('resize', () => {
    if (status === 'connected') initVisualizer();
});

// Init
setStatus('idle');
</script>
